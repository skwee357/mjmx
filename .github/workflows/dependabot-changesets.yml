name: Dependabot Changesets

on:
  pull_request_target:
    types: [opened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    name: Create changeset
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - uses: feelepxyz/dependabot-changesets@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
